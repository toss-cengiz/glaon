# Glaon local Home Assistant dev fixture.
# Spec: docs/home-assistant-dev.md.
#
# Image is digest-pinned for reproducibility; Renovate keeps it current
# (renovate.json extends config:best-practices, which pins Docker tags).

services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable@sha256:d4fbec16196d5c8bedf32647f0ca7165f654d92a2e81f35a373508d3226cb867
    container_name: glaon-dev-ha
    restart: unless-stopped
    ports:
      - '8123:8123'
    volumes:
      - ./config:/config
    environment:
      TZ: Europe/Istanbul
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8123 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
