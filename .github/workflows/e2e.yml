name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: playwright
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @glaon/web-e2e exec playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @glaon/web-e2e exec playwright install-deps chromium

      - name: Build web app
        run: pnpm --filter @glaon/web build
        env:
          # Placeholder DSN so the production-build DSN gate in vite.config.ts passes.
          # Events would go nowhere (dummy host) — E2E doesn't assert on Sentry traffic.
          VITE_SENTRY_DSN: https://public@sentry.invalid/0
          # Mount the cloud subtree for the pairing wizard smoke. The
          # publishable key is a placeholder — Vite aliases @clerk/clerk-react
          # to a deterministic stub when VITE_E2E_AUTH_STUB=true (#359).
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_e2e_smoke
          VITE_E2E_AUTH_STUB: 'true'
          # The CSP `connect-src` allows `https:` only — the plain-HTTP
          # fallback hardcoded in App.tsx (homeassistant.local:8123)
          # would block the /auth/token POST in the local-mode smoke.
          # The host doesn't resolve in CI anyway; Playwright intercepts
          # the request at the route level and fulfills it locally.
          VITE_HA_BASE_URL: https://homeassistant.local:8123
          # Same reasoning for the apps/api endpoint (#470 / ADR 0027) —
          # the default `http://localhost:3000` is plain-HTTP and CSP
          # would block the password-grant POST. Use an HTTPS placeholder
          # that Playwright `page.route()` matches and fulfills locally.
          VITE_API_BASE_URL: https://api.glaon.invalid

      - name: Run Playwright smoke tests
        run: pnpm --filter @glaon/web-e2e e2e --project=chromium --grep @smoke
        env:
          CI: '1'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: apps/web-e2e/playwright-report/
          retention-days: 7
