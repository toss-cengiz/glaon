name: Bug
description: Report a defect or regression.
title: 'fix(<scope>): <symptom>'
labels: ['type:fix']
body:
  - type: markdown
    attributes:
      value: |
        Something's broken. Describe repro so another developer can confirm.
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      options:
        - phase-0 (Foundation)
        - phase-1 (HA integration)
        - phase-2 (Core UI)
        - phase-3 (Security hardening)
        - phase-4 (Features)
        - phase-5 (Polish & release)
    validations:
      required: true
  - type: dropdown
    id: areas
    attributes:
      label: Areas
      multiple: true
      options:
        - area:web
        - area:mobile
        - area:core
        - area:ui
        - area:addon
        - area:ci
        - area:security
        - area:docs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser/device, Node/pnpm version, HA version, branch or commit.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, traces
      description: Paste with triple backticks. Sanitize tokens and PII before submitting.
